commands:
  install: npm install
  build: npm run build
  test: npm run test
  lint: npm run lint
  typecheck: npx tsc --noEmit

services:
  web:
    start: npm run dev
    stop: lsof -ti :3000 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []
