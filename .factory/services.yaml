commands:
  install: npm install
  build: node_modules\.bin\next.cmd build
  test: node_modules\.bin\vitest.cmd run
  lint: node_modules\.bin\eslint.cmd .
  typecheck: node_modules\.bin\tsc.cmd --noEmit

services:
  web:
    start: node_modules\.bin\next.cmd dev
    stop: "Stop-Process -Name node -ErrorAction SilentlyContinue"
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []
